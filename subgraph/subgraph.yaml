specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Ocean
    network: matic
    source:
      address: "0x8A8fBCf8134fc217314e251700636d09855c5700"
      abi: Ocean
      startBlock: 90130496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BottleClaimed
        - BottleMinted
      abis:
        - name: Ocean
          file: ./abis/Ocean.json
      eventHandlers:
        - event: BottleMinted(indexed address,indexed uint256,string)
          handler: handleBottleMinted
        - event: BottleClaimed(indexed address,indexed uint256)
          handler: handleBottleClaimed
      file: ./src/ocean.ts
